services:
  mongo:
    image: mongo:7
    container_name: umurava-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: umurava-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"

  identity-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      IDENTITY_SERVICE_PORT: ${IDENTITY_SERVICE_PORT}
      AUTH_SERVICE_PORT: ${IDENTITY_SERVICE_PORT}
      IDENTITY_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/identitydb?authSource=admin
      AUTH_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/identitydb?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      DEFAULT_SOURCE_NAME: ${DEFAULT_SOURCE_NAME}
      DEFAULT_SOURCE_CODE: ${DEFAULT_SOURCE_CODE}
    working_dir: /app/apps/identity-service
    command: ["node", "dist/index.js"]
    depends_on:
      - mongo

  job-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      JOB_SERVICE_PORT: ${JOB_SERVICE_PORT}
      JOB_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/jobdb?authSource=admin
      DEFAULT_SOURCE_NAME: ${DEFAULT_SOURCE_NAME}
      DEFAULT_SOURCE_CODE: ${DEFAULT_SOURCE_CODE}
    working_dir: /app/apps/job-service
    command: ["node", "dist/index.js"]
    depends_on:
      - mongo

  applicant-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      APPLICANT_SERVICE_PORT: ${APPLICANT_SERVICE_PORT}
      APPLICANT_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/applicantdb?authSource=admin
      UPLOAD_DIR: /app/apps/applicant-service/src/uploads
      JOB_SERVICE_URL: http://job-service:${JOB_SERVICE_PORT}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
      REDIS_URL: redis://redis:6379
    working_dir: /app/apps/applicant-service
    command: ["node", "dist/index.js"]
    volumes:
      # Same files on your PC as inside the container (Windows: under your repo path)
      - ./apps/applicant-service/src/uploads:/app/apps/applicant-service/src/uploads
    depends_on:
      - mongo
      - job-service

  screening-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      SCREENING_SERVICE_PORT: ${SCREENING_SERVICE_PORT}
      SCREENING_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/screeningdb?authSource=admin
      REDIS_URL: redis://redis:6379
    working_dir: /app/apps/screening-service
    command: ["node", "dist/index.js"]
    depends_on:
      - mongo
      - redis

  worker-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      WORKER_SERVICE_PORT: ${WORKER_SERVICE_PORT}
      SCREENING_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/screeningdb?authSource=admin
      REDIS_URL: redis://redis:6379
      JOB_SERVICE_URL: http://job-service:${JOB_SERVICE_PORT}
      APPLICANT_SERVICE_URL: http://applicant-service:${APPLICANT_SERVICE_PORT}
      NOTIFICATION_SERVICE_URL: http://notification-service:${NOTIFICATION_SERVICE_PORT}
      DEFAULT_SOURCE_NAME: ${DEFAULT_SOURCE_NAME}
      DEFAULT_SOURCE_CODE: ${DEFAULT_SOURCE_CODE}
    working_dir: /app/apps/worker-service
    command: ["node", "dist/index.js"]
    depends_on:
      - mongo
      - redis
      - job-service
      - applicant-service
      - notification-service

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      NOTIFICATION_SERVICE_PORT: ${NOTIFICATION_SERVICE_PORT}
    working_dir: /app/apps/notification-service
    command: ["node", "dist/index.js"]
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:${NOTIFICATION_SERVICE_PORT}"

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      API_GATEWAY_PORT: ${API_GATEWAY_PORT}
      JWT_SECRET: ${JWT_SECRET}
      IDENTITY_SERVICE_URL: http://identity-service:${IDENTITY_SERVICE_PORT}
      JOB_SERVICE_URL: http://job-service:${JOB_SERVICE_PORT}
      APPLICANT_SERVICE_URL: http://applicant-service:${APPLICANT_SERVICE_PORT}
      SCREENING_SERVICE_URL: http://screening-service:${SCREENING_SERVICE_PORT}
    working_dir: /app/apps/api-gateway
    command: ["node", "dist/index.js"]
    ports:
      - "${API_GATEWAY_PORT}:${API_GATEWAY_PORT}"
    depends_on:
      - identity-service
      - job-service
      - applicant-service
      - screening-service

volumes:
  mongo_data:
